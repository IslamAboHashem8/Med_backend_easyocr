services:
  - type: web
    name: smart-medication-reminder-backend
    runtime: node
    plan: free

    buildCommand: |
      npm install
      pip install -r requirements.txt

    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: MONGO_URI
        sync: false

      - key: PORT
        value: 10000